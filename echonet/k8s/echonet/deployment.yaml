apiVersion: apps/v1
kind: Deployment
metadata:
  name: echonet
  labels:
    app.kubernetes.io/name: echonet
    app.kubernetes.io/component: api
spec:
  replicas: 1
  # Kill the old pod before starting the new one: the PVC has node affinity,
  # so under RollingUpdate the new pod hangs on a Multi-Attach error.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      # NOTE: Deployment selectors are immutable once created.
      # Keep these stable so `kubectl apply` works across updates.
      app: echonet
      role: flask
  template:
    metadata:
      labels:
        app: echonet
        role: flask
        app.kubernetes.io/name: echonet
        app.kubernetes.io/component: api
        scaleops.sh/managed-unevictable: "true"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: echonet

      # Pin to an n4-standard-8: ScaleOps mutates `requests` under its cost
      # policy and would pack us onto a node too small for the OS-runner
      # workers; a nodeSelector survives that. The pool is tainted
      # role=sequencer, hence the toleration.
      nodeSelector:
        node.kubernetes.io/instance-type: n4-standard-8
      tolerations:
        - key: role
          operator: Equal
          value: sequencer
          effect: NoSchedule

      initContainers:
        - name: extract-echonet-src
          image: alpine:3.20
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /app
              base64 -d /bundle/echonet-src.tgz.b64 > /tmp/echonet-src.tgz
              tar -xzf /tmp/echonet-src.tgz -C /app
              test -f /app/echonet/__init__.py
          volumeMounts:
            - name: echonet-src-bundle
              mountPath: /bundle
              readOnly: true
            - name: app-src
              mountPath: /app
        - name: sync-echonet-keys
          image: alpine:3.20
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /data/echonet
              cp /keys/echonet_keys.json /data/echonet/echonet_keys.json
              chmod 600 /data/echonet/echonet_keys.json || true
          volumeMounts:
            - name: echonet-keys
              mountPath: /keys
              readOnly: true
            - name: data-dir
              mountPath: /data

      containers:
        - name: echonet
          image: python:3.11-slim
          ports:
            - name: http
              containerPort: 80
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: "/app"
            - name: BLOCKS_DIR
              value: "/data/blocks"
            - name: ECHONET_LOG_DIR
              value: "/data/echonet"
          command: ["bash","-lc"]
          args:
            - >
              export PYTHONPATH=/app:${PYTHONPATH:-} &&
              python -m pip install --no-cache-dir --disable-pip-version-check
              flask gunicorn requests aiohttp 'kubernetes<36' eth_abi 'cairo-lang==0.14.0.1' zstandard &&
              echo "[echonet] starting gunicorn on :80 (1 worker, 8 threads, 300s timeout)" &&
              gunicorn -w 1 --threads 8 -b 0.0.0.0:80 echonet.echo_center:app --timeout 300 --access-logfile -
          workingDir: /app
          resources:
            # Sized for 8 OS-runner workers + flask + transient blob parsing
            # (~6 CPU / 12-14 GiB working set).
            requests:
              cpu: "6"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 28Gi
          volumeMounts:
            - { name: app-src, mountPath: /app }
            - { name: data-dir, mountPath: /data }
            - { name: echonet-secrets, mountPath: /etc/echonet, readOnly: true }

      volumes:
        - name: echonet-src-bundle
          configMap:
            name: echonet-src
            items:
              - { key: echonet-src.tgz.b64, path: echonet-src.tgz.b64 }
        - name: echonet-keys
          configMap:
            name: echonet-keys
            items:
              - { key: echonet_keys.json, path: echonet_keys.json }
        - name: echonet-secrets
          secret:
            secretName: echonet-secrets
            items:
              - { key: echonet_secrets.json, path: echonet_secrets.json }
        - name: app-src
          emptyDir: {}
        - name: data-dir
          persistentVolumeClaim:
            claimName: echonet-data